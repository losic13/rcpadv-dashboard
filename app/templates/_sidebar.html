<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon" aria-hidden="true">📊</div>
    <div class="brand-name">
      <div class="brand-line-1">Recipe Advisor</div>
      <div class="brand-line-2">Site Reliability Dashboard</div>
    </div>
  </div>
  <nav>
    <ul class="nav-list">
      {% for item in nav_items %}
      <li class="nav-item {% if item.key == active_nav %}active{% endif %}">
        <a href="{{ item.url }}">{{ item.label }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</aside>
