<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">📊</span>
    <span class="brand-name">
      <strong>Recipe Advisor</strong>
      <small>Site Reliability Dashboard</small>
    </span>
  </div>
  <nav>
    <ul class="nav-list">
      {% for item in nav_items %}
      <li class="nav-item {% if item.key == active_nav %}active{% endif %}">
        <a href="{{ item.url }}">{{ item.label }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</aside>
