<aside class="sidebar">
  <a href="/" class="sidebar-brand" title="통합 대시보드로 이동">
    <div class="brand-icon" aria-hidden="true">📊</div>
    <div class="brand-name">
      <div class="brand-line-1">Recipe Advisor</div>
      <div class="brand-line-2">Site Reliability Dashboard</div>
    </div>
  </a>
  <nav>
    <ul class="nav-list">
      {% for item in nav_items %}
      <li class="nav-item {% if item.key == active_nav %}active{% endif %}">
        <a href="{{ item.url }}">{{ item.label }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>

  <div class="sidebar-footer">
    <form method="post" action="/logout" class="sidebar-logout-form">
      <button type="submit" class="sidebar-logout-btn" title="로그아웃">
        <span class="sidebar-logout-icon" aria-hidden="true">⎋</span>
        <span class="sidebar-logout-label">로그아웃</span>
      </button>
    </form>
  </div>
</aside>
